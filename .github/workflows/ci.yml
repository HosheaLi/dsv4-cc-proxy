name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r proxy/requirements.txt
        pip install pytest

    - name: Run tests
      run: python -m pytest proxy/test_proxy.py -v

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install linting tools
      run: pip install ruff
    - name: Lint with ruff
      run: ruff check proxy/deepseek-thinking-proxy.py proxy/test_proxy.py

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: hosheali/dsv4-cc-proxy
        tags: |
          type=raw,value=latest
          type=raw,value=${{ github.sha }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
    - name: Smoke test Docker image
      run: |
        docker run -d -p 16889:16889 --name bridge-test hosheali/dsv4-cc-proxy
        sleep 3
        curl -f http://localhost:16889/health
        docker stop bridge-test
